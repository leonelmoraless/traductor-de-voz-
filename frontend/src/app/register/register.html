<div class="register-principal">
  <div class="register-card">

    <div class="register-brand">
      <h1 class="brand-title">REGISTRO</h1>
      <p class="brand-subtitle">Crea tu cuenta</p>
    </div>

    <p-divider />

    <div class="register-fields">
      

      <p-floatlabel variant="in">
        <input pInputText id="email" type="email" [(ngModel)]="email" />
        <label for="email">Email</label>
      </p-floatlabel>

      <p-floatlabel variant="in">
        <input pInputText id="usuario" [(ngModel)]="usuario" />
        <label for="usuario">Usuario</label>
      </p-floatlabel>

      <p-floatlabel variant="in">
        <p-password [(ngModel)]="password" [toggleMask]="true" autocomplete="off" />
        <label for="password">Contraseña</label>
      </p-floatlabel>

      <p-floatlabel variant="in">
        <p-password [(ngModel)]="confirmPassword" [toggleMask]="true" autocomplete="off" />
        <label for="confirmPassword">Confirmar contraseña</label>
      </p-floatlabel>

      <div class="terms-section">
        <p-checkbox [binary]="true" [(ngModel)]="terminos" inputId="terminos" />
        <label for="terminos">Acepto los términos y condiciones</label>
      </div>
    </div>

    <p-button label="Registrarse" (onClick)="registrarse()" styleClass="register-btn" />

    <div class="login-section">
      <span>¿Ya tienes cuenta?</span>
      <p-button label="Inicia sesión" [text]="true" (onClick)="irAlLogin()" />
    </div>
  </div>
</div>
